<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제철 음식</title>
<style>
  @font-face{
    font-family:"Pretendard";
    src:url("fonts/PretendardVariable.woff2") format("woff2-variations");
    font-weight:100 900;font-display:swap;
  }
  :root{
    --paper:#FBFAF7; --line:#00000012;
    --green:#1E9E57; --coral:#FF5C84; --ink:#26241F; --muted:#9c968b;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;}
  html,body{background:transparent;overflow:hidden;
    font-family:"Pretendard",-apple-system,"Apple SD Gothic Neo",sans-serif;}
  #card{
    margin:8px;height:calc(100vh - 16px);border-radius:16px;
    background:var(--paper);overflow:hidden;position:relative;
    -webkit-app-region:drag;box-shadow:0 8px 24px #0000001f, inset 0 0 0 1px var(--line);
    color:var(--ink);padding:13px 15px;display:flex;flex-direction:column;
  }
  .top{display:flex;justify-content:space-between;align-items:baseline;}
  .mon{font-size:14px;font-weight:800;color:var(--green);letter-spacing:-.3px;}
  .season{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}

  .body{flex:1;display:flex;align-items:center;gap:13px;margin:2px 0;}
  .imgwrap{width:74px;height:74px;flex:none;display:flex;align-items:center;justify-content:center;}
  .fimg{max-width:74px;max-height:74px;object-fit:contain;
    filter:drop-shadow(0 3px 5px #00000020);animation:fade .5s ease;}
  .emoji{font-size:52px;line-height:1;animation:fade .5s ease;}
  .info{min-width:0;}
  .cat{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.5px;
    color:var(--coral);}
  .fname{font-size:25px;font-weight:800;letter-spacing:-.6px;line-height:1.05;margin-top:1px;}

  .foot{display:flex;justify-content:space-between;align-items:center;
    font-size:10px;font-weight:600;color:var(--muted);}
  .foot .cnt b{color:var(--ink);font-weight:800;}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
  <div id="card">
    <div class="top">
      <span class="mon" id="mon">6월 제철</span>
      <span class="season" id="season">SUMMER</span>
    </div>
    <div class="body">
      <div class="imgwrap">
        <img class="fimg" id="fimg" alt="" style="display:none">
        <span class="emoji" id="femoji">🍽️</span>
      </div>
      <div class="info">
        <span class="cat" id="fcat">제철</span>
        <div class="fname" id="fname">—</div>
      </div>
    </div>
    <div class="foot">
      <span id="today">오늘의 제철</span>
      <span class="cnt" id="cnt"></span>
    </div>
  </div>
  <script src="data.js"></script>
  <script src="slugs.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
