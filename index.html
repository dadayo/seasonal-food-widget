<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제철 음식</title>
<style>
  @font-face{font-family:"Pretendard";src:url("fonts/PretendardVariable.woff2") format("woff2-variations");font-weight:100 900;font-display:swap;}
  :root{--paper:#FBFAF7;--line:#00000012;--green:#1E9E57;--coral:#FF5C84;--ink:#26241F;--muted:#9c968b;
    --accent:#E2722B;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;}
  html,body{background:transparent;overflow:hidden;font-family:"Pretendard",-apple-system,sans-serif;}
  #card{margin:44px;height:calc(100vh - 88px);border-radius:17px;background:var(--paper);
    overflow:hidden;position:relative;-webkit-app-region:drag;
    box-shadow:0 2px 5px #0000000d, 0 8px 16px #00000012, 0 14px 26px #00000016,
      inset 0 0 0 1px var(--line);
    color:var(--ink);padding:0;perspective:1100px;}
  .page{position:relative;height:100%;padding:13px 15px;display:flex;flex-direction:column;
    background:var(--paper);z-index:1;}
  /* full-page tear-off overlay */
  .pageturn{position:absolute;inset:0;z-index:20;transform-origin:0 0;
    backface-visibility:hidden;will-change:transform,opacity;}
  .pageturn .page{box-shadow:0 14px 26px #0000002b;}
  .pageturn::after{content:"";position:absolute;inset:0;
    background:linear-gradient(135deg, #0000 30%, #00000033);opacity:0;}
  .pageturn.go{animation:teardiag .66s cubic-bezier(.36,.02,.3,1) forwards;}
  .pageturn.go::after{animation:shade .66s ease forwards;}
  /* diagonal tear: pivots at top-left corner, folds up and tilts away */
  @keyframes teardiag{
    0%{transform:rotateZ(0) rotateX(0)}
    100%{transform:rotateZ(-13deg) rotateX(-118deg);opacity:.1}}
  @keyframes shade{0%{opacity:0}100%{opacity:.55}}

  /* header = context (de-emphasized) */
  .top{display:flex;justify-content:space-between;align-items:center;flex:none;z-index:2;}
  .navwrap{display:flex;align-items:center;gap:5px;}
  .mon{font-weight:700;color:var(--accent);letter-spacing:-.2px;font-size:12.5px;}
  .nav{font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;line-height:1;
    -webkit-app-region:no-drag;padding:0 1px;opacity:.6;transition:opacity .12s,color .12s;}
  .nav:hover{opacity:1;color:var(--accent);}
  .season{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1.2px;}

  /* hero = the star */
  .stage{flex:1;position:relative;display:flex;align-items:center;}
  .bignum{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    font-size:210px;font-weight:900;color:var(--accent);opacity:.10;z-index:0;letter-spacing:-8px;}
  .flip{position:relative;z-index:1;width:100%;}
  .body{display:flex;align-items:center;gap:14px;}
  .imgwrap{flex:none;display:flex;align-items:center;justify-content:center;position:relative;
    -webkit-app-region:no-drag;cursor:pointer;}
  .imgwrap::before{content:"";position:absolute;width:122%;height:122%;border-radius:50%;
    background:radial-gradient(closest-side, color-mix(in srgb, var(--accent) 16%, transparent), #0000 72%);z-index:-1;}
  .fimg{object-fit:contain;filter:drop-shadow(0 4px 7px #00000026);position:relative;z-index:1;transition:transform .3s ease;}
  .emoji{line-height:1;}
  .info{min-width:0;flex:1;}
  .cat{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.6px;color:var(--accent);}
  .fname{font-weight:800;letter-spacing:-.8px;line-height:1.02;margin-top:2px;color:var(--ink);
    word-break:keep-all;}
  .recipe{margin-top:7px;font-size:11px;color:var(--muted);font-weight:600;
    -webkit-app-region:no-drag;cursor:pointer;line-height:1.3;}
  .recipe b{color:#5d564c;font-weight:700;}
  .recipe .go-r{color:var(--accent);font-weight:800;white-space:nowrap;}

  /* browse strip = secondary (calm, current item only is emphasized) */
  .peek{display:none;flex-wrap:wrap;gap:5px;margin-top:11px;padding-top:11px;flex:none;
    border-top:1px solid #00000010;}
  .peek .p{width:27px;height:27px;border-radius:7px;background:#00000005;display:flex;
    align-items:center;justify-content:center;-webkit-app-region:no-drag;cursor:pointer;
    opacity:.78;transition:transform .12s,opacity .12s;}
  .peek .p:hover{transform:translateY(-2px);opacity:1;}
  .peek .p img{max-width:20px;max-height:20px;object-fit:contain;}
  .peek .p span{font-size:14px;}
  .peek .p.on{opacity:1;background:#fff;box-shadow:0 0 0 2px var(--accent);transform:scale(1.04);}

  .foot{display:flex;justify-content:space-between;align-items:center;flex:none;margin-top:10px;
    padding-top:9px;border-top:1px solid #00000010;font-size:10px;font-weight:600;color:var(--muted);}
  .foot .cnt b{color:var(--ink);font-weight:800;}

  /* ---- size: small : hero only, ultra clean ---- */
  [data-size="s"] .fimg{max-width:66px;max-height:66px;}
  [data-size="s"] .emoji{font-size:48px;}
  [data-size="s"] .imgwrap{width:66px;height:66px;}
  [data-size="s"] .fname{font-size:24px;}
  [data-size="s"] .recipe{display:none;position:absolute;left:13px;right:13px;bottom:34px;
    background:#fffffff5;padding:7px 10px;border-radius:10px;box-shadow:0 6px 16px #0003;z-index:5;}
  [data-size="s"] #card:hover .recipe{display:block;}

  /* ---- size: medium : hero dominant + calm browse strip ---- */
  [data-size="m"] .fimg{max-width:100px;max-height:100px;}
  [data-size="m"] .emoji{font-size:68px;}
  [data-size="m"] .imgwrap{width:100px;height:100px;}
  [data-size="m"] .fname{font-size:28px;}
  [data-size="m"] .peek{display:flex;}

  /* ---- size: large : poster, big hero centered ---- */
  [data-size="l"] .bignum{display:flex;}
  [data-size="l"] .mon{font-size:14px;}
  [data-size="l"] .body{flex-direction:column;text-align:center;gap:8px;}
  [data-size="l"] .info{text-align:center;}
  [data-size="l"] .fimg{max-width:150px;max-height:150px;}
  [data-size="l"] .emoji{font-size:112px;}
  [data-size="l"] .imgwrap{width:150px;height:150px;}
  [data-size="l"] .fname{font-size:36px;margin-top:4px;}
  [data-size="l"] .recipe{font-size:12px;margin-top:9px;}
  [data-size="l"] .peek{display:flex;justify-content:center;}
</style>
</head>
<body>
  <div id="card" data-size="m">
   <div class="page" id="page">
    <div class="top">
      <span class="navwrap">
        <span class="nav" id="prev">‹</span>
        <span class="mon" id="mon">6월 제철</span>
        <span class="nav" id="next">›</span>
      </span>
      <span class="season" id="season">SUMMER</span>
    </div>
    <div class="stage">
      <div class="bignum" id="bignum">6</div>
      <div class="flip" id="flip">
        <div class="body">
          <div class="imgwrap" id="imgwrap">
            <img class="fimg" id="fimg" alt="" style="display:none">
            <span class="emoji" id="femoji">🍽️</span>
          </div>
          <div class="info">
            <span class="cat" id="fcat">제철</span>
            <div class="fname" id="fname">—</div>
            <div class="recipe" id="recipe"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="peek" id="peek"></div>
    <div class="foot"><span id="today">오늘의 제철</span><span class="cnt" id="cnt"></span></div>
   </div>
  </div>
  <script src="data.js"></script>
  <script src="slugs.js"></script>
  <script src="recipes.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
