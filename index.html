<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제철 달력</title>
<style>
  @font-face{font-family:"Pretendard";src:url("fonts/PretendardVariable.woff2") format("woff2-variations");font-weight:100 900;font-display:swap;}
  :root{--paper:#FBFAF6;--line:#00000010;--ink:#2c2a24;--muted:#a39d90;--accent:#E2722B;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;}
  html,body{background:transparent;overflow:hidden;font-family:"Pretendard",-apple-system,sans-serif;}

  .shadowwrap{margin:42px;height:calc(100vh - 84px);position:relative;-webkit-app-region:drag;
    filter:drop-shadow(0 2px 5px #00000012) drop-shadow(0 9px 16px #0000001c) drop-shadow(0 15px 24px #00000012);}
  #card{height:100%;background:var(--paper);overflow:hidden;position:relative;color:var(--ink);padding:0;perspective:1100px;
    box-shadow:inset 0 0 0 10px var(--accent), inset 0 0 0 13px #fffffff2, inset 0 0 0 14px #00000014;
    transition:box-shadow .7s ease;
    -webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 320' preserveAspectRatio='none'><filter id='r'><feTurbulence type='fractalNoise' baseFrequency='0.018' numOctaves='2' seed='7' result='n'/><feDisplacementMap in='SourceGraphic' in2='n' scale='7' xChannelSelector='R' yChannelSelector='G'/></filter><rect x='5' y='5' width='310' height='310' rx='13' ry='13' fill='black' filter='url(%23r)'/></svg>") center/100% 100% no-repeat;}
  #card::after{content:"";position:absolute;inset:0;z-index:25;pointer-events:none;opacity:.32;mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/></svg>");}
  .page{position:relative;height:100%;padding:22px 24px 18px;display:flex;flex-direction:column;background:var(--paper);z-index:1;}

  /* header */
  .top{display:flex;align-items:center;flex:none;z-index:2;}
  .date{flex:1;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.2px;}
  .navwrap{flex:0 0 auto;display:flex;align-items:center;gap:8px;}
  .ttl{font-weight:800;color:var(--ink);font-size:21px;letter-spacing:-.5px;}
  .nav{font-size:19px;font-weight:800;color:var(--accent);cursor:pointer;line-height:1;-webkit-app-region:no-drag;
    width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;opacity:.55;
    transition:opacity .12s,background .12s;}
  .nav:hover{opacity:1;background:color-mix(in srgb, var(--accent) 16%, transparent);}
  .todayWrap{flex:1;text-align:right;}
  .todaybtn{font-size:10px;font-weight:800;color:#fff;background:var(--accent);border:none;border-radius:11px;
    padding:3px 10px;cursor:pointer;-webkit-app-region:no-drag;transition:background .3s,opacity .12s;}
  .todaybtn:hover{opacity:.85;}

  /* floating foods */
  .stage{flex:1;position:relative;margin:6px 0;overflow:hidden;}
  .collage{position:absolute;inset:0;}
  .cl-ov{position:absolute;inset:0;z-index:6;pointer-events:none;}
  @keyframes clOutL{to{transform:translateX(-64%) scale(.975);opacity:0}}
  @keyframes clOutR{to{transform:translateX(64%) scale(.975);opacity:0}}
  @keyframes clInR{from{transform:translateX(32%) scale(.97);opacity:0}to{transform:none;opacity:1}}
  @keyframes clInL{from{transform:translateX(-32%) scale(.97);opacity:0}to{transform:none;opacity:1}}
  .collage .pim{position:absolute;top:0;left:0;-webkit-app-region:no-drag;cursor:grab;touch-action:none;will-change:transform;z-index:1;}
  .collage .pim:active{cursor:grabbing;}
  .collage .pim:hover{z-index:6;}
  .collage .pim-img{position:relative;z-index:1;display:block;filter:drop-shadow(0 3px 5px #0000001f);transition:opacity .35s ease,filter .15s ease;}
  .collage .pim:hover .pim-img{filter:drop-shadow(0 7px 12px #00000042);}
  .collage .pim.sel .pim-img{filter:drop-shadow(0 0 0 3px var(--accent)) drop-shadow(0 5px 9px #00000033);}
  /* eaten = food stuck on a little stamp paper (perforation-ish dashed edge) */
  .collage .paper{position:absolute;left:50%;top:50%;width:122%;height:122%;z-index:0;display:none;
    transform:translate(-50%,-50%) rotate(-7deg);background:#fffffff2;border-radius:6px;
    border:1.6px dashed color-mix(in srgb, var(--accent) 55%, #fff);box-shadow:0 2px 6px #00000026;}
  .collage .pim.eaten .paper{display:block;}
  .collage .pim.pop .paper{animation:paperIn .42s cubic-bezier(.2,1.5,.4,1);}
  @keyframes paperIn{0%{opacity:0;transform:translate(-50%,-50%) rotate(-7deg) scale(.4)}100%{opacity:1;transform:translate(-50%,-50%) rotate(-7deg) scale(1)}}
  .collage .pop-emoji{position:absolute;font-size:28px;pointer-events:none;transform:translate(-50%,-50%);
    animation:burst 1.1s ease forwards;z-index:8;}
  /* floating overlay label (name + recipe) above the pointed/selected food */
  .flabel{position:absolute;z-index:12;transform:translate(-50%,-100%);background:#fffffff5;border-radius:9px;
    padding:4px 10px;box-shadow:0 4px 12px #00000026;text-align:center;white-space:nowrap;-webkit-app-region:no-drag;
    transition:opacity .12s;}
  .flabel[hidden]{display:none;}
  .flabel::after{content:"";position:absolute;left:50%;bottom:-5px;transform:translateX(-50%);
    border:5px solid transparent;border-top-color:#fffffff5;}
  #flname{font-weight:800;font-size:14px;color:var(--ink);letter-spacing:-.3px;}
  #flrec{display:block;font-size:10px;color:#5d564c;font-weight:600;margin-top:1px;}
  #flrec .go-r{color:var(--accent);font-weight:800;cursor:pointer;}
  #flrec .eaten-d{color:var(--accent);font-weight:800;}
  @keyframes burst{0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
    20%{opacity:1;transform:translate(calc(-50% + var(--dx)*.5),calc(-50% + var(--dy)*.5)) scale(1.1)}
    100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.9)}}

  /* lower: progress (left) + name/recipe (right) */
  .lower{display:flex;justify-content:space-between;align-items:flex-end;flex:none;gap:10px;}
  .prog{display:flex;flex-direction:column;line-height:1;flex:none;cursor:pointer;-webkit-app-region:no-drag;}
  .pnum{font-size:40px;font-weight:900;color:var(--accent);letter-spacing:-2px;transition:color .7s ease;}
  .pof{font-size:17px;font-weight:800;color:var(--accent);opacity:.5;margin-left:1px;}
  .prog small{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-top:5px;}
  .namebox{text-align:right;align-self:flex-end;min-width:0;}
  .namebig{display:block;font-weight:800;color:var(--muted);font-size:15px;line-height:1.15;letter-spacing:-.3px;transition:color .15s ease;}
  .namebig.active{color:#1e1c18;}
  .namerec{display:block;font-size:10px;color:#5d564c;font-weight:600;margin-top:2px;}
  .namerec .go-r{color:var(--accent);font-weight:800;cursor:pointer;-webkit-app-region:no-drag;}
  .namerec .eaten-d{color:var(--accent);font-weight:800;}

  /* sizes */
  [data-size="s"] .ttl{font-size:18px;} [data-size="s"] .namebig{font-size:13px;}
  [data-size="l"] .ttl{font-size:24px;} [data-size="l"] .pnum{font-size:50px;} [data-size="l"] .pof{font-size:21px;}
  [data-size="l"] .namebig{font-size:17px;}
  /* small/medium = clean: no bottom bar at all (info shows as overlay on the food) */
  [data-size="s"] .lower, [data-size="m"] .lower{display:none;}

  /* 먹은 일기 패널 */
  .diary{position:absolute;inset:8px;z-index:40;background:var(--paper);border-radius:11px;-webkit-app-region:no-drag;
    box-shadow:0 10px 28px #00000033, inset 0 0 0 2px var(--accent);display:flex;flex-direction:column;padding:14px 16px;}
  .diary[hidden]{display:none;}
  .dhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex:none;}
  .dhead #dtitle{font-weight:800;color:var(--ink);font-size:15px;}
  .dhead button{border:none;background:none;font-size:15px;color:var(--muted);cursor:pointer;line-height:1;padding:2px 4px;}
  .dlist{flex:1;overflow:auto;display:flex;flex-direction:column;gap:11px;}
  .dgroup{}
  .ddate{font-size:11px;font-weight:800;color:var(--accent);margin-bottom:5px;}
  .dstamps{display:flex;flex-wrap:wrap;gap:7px;}
  .scard{width:48px;height:48px;background:#fff;border:1.6px dashed color-mix(in srgb,var(--accent) 55%,#fff);
    border-radius:6px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px #00000022;}
  .scard img{max-width:38px;max-height:38px;object-fit:contain;}
  .dempty{font-size:11.5px;color:var(--muted);line-height:1.6;text-align:center;margin:auto;}
</style>
</head>
<body>
  <div class="shadowwrap">
   <div id="card" data-size="m">
    <div class="page" id="page">
      <div class="top">
        <span class="date" id="date">18일 목</span>
        <span class="navwrap"><span class="nav" id="prev">‹</span><span class="ttl" id="mon">6월</span><span class="nav" id="next">›</span></span>
        <span class="todayWrap"><button class="todaybtn" id="todayBtn">오늘</button></span>
      </div>
      <div class="stage">
        <div class="collage" id="collage"></div>
        <div class="flabel" id="flabel" hidden><span id="flname"></span><small id="flrec"></small></div>
      </div>
      <div class="lower">
        <div class="prog" id="prog"><span><b class="pnum" id="pnum">0</b><span class="pof" id="pof">/0</span></span><small>맛본 제철 ›</small></div>
      </div>
      <div class="diary" id="diary" hidden>
        <div class="dhead"><span id="dtitle">먹은 일기</span><button id="dclose">✕</button></div>
        <div class="dlist" id="dlist"></div>
      </div>
    </div>
   </div>
  </div>
  <script src="data.js"></script>
  <script src="slugs.js"></script>
  <script src="recipes.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
