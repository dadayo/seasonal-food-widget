<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제철 달력</title>
<style>
  @font-face{font-family:"Pretendard";src:url("fonts/PretendardVariable.woff2") format("woff2-variations");font-weight:100 900;font-display:swap;}
  :root{--paper:#FBFAF6;--line:#00000010;--ink:#2c2a24;--muted:#a39d90;--accent:#E2722B;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;}
  html,body{background:transparent;overflow:hidden;font-family:"Pretendard",-apple-system,sans-serif;}

  /* drop-shadow on wrapper so it traces the deckle (masked) card shape */
  .shadowwrap{margin:42px;height:calc(100vh - 84px);position:relative;-webkit-app-region:drag;
    filter:drop-shadow(0 2px 5px #00000012) drop-shadow(0 9px 16px #0000001c) drop-shadow(0 15px 24px #00000012);}
  #card{height:100%;background:var(--paper);overflow:hidden;position:relative;color:var(--ink);
    padding:0;perspective:1100px;
    -webkit-mask:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 320' preserveAspectRatio='none'><filter id='r'><feTurbulence type='fractalNoise' baseFrequency='0.018' numOctaves='2' seed='7' result='n'/><feDisplacementMap in='SourceGraphic' in2='n' scale='7' xChannelSelector='R' yChannelSelector='G'/></filter><rect x='5' y='5' width='310' height='310' rx='13' ry='13' fill='black' filter='url(%23r)'/></svg>") center/100% 100% no-repeat;}
  /* riso grain */
  #card::after{content:"";position:absolute;inset:0;z-index:25;pointer-events:none;opacity:.32;mix-blend-mode:multiply;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/></svg>");}
  /* spiral binding */
  .binding{position:absolute;top:0;left:0;right:0;height:24px;z-index:30;display:flex;justify-content:center;align-items:center;gap:10px;pointer-events:none;}
  .binding::before{content:"";position:absolute;top:7px;left:34px;right:34px;height:2px;background:#0000000f;border-radius:2px;}
  .binding .ring{width:8px;height:11px;border-radius:50%;border:2px solid #0000002b;background:var(--paper);margin-top:-5px;}

  .page{position:relative;height:100%;padding:28px 18px 14px;display:flex;flex-direction:column;background:var(--paper);z-index:1;}

  /* motions */
  .pageturn{position:absolute;inset:0;z-index:20;backface-visibility:hidden;will-change:transform,opacity;}
  .pageturn .page{box-shadow:0 14px 26px #0000002b;}
  .pageturn.slideL{animation:slideL .62s cubic-bezier(.5,0,.35,1) forwards;}
  .pageturn.slideR{animation:slideR .62s cubic-bezier(.5,0,.35,1) forwards;}
  @keyframes slideL{to{transform:translateX(-107%);opacity:.5}}
  @keyframes slideR{to{transform:translateX(107%);opacity:.5}}
  .page.inR{animation:inR .62s cubic-bezier(.5,0,.35,1);}
  .page.inL{animation:inL .62s cubic-bezier(.5,0,.35,1);}
  @keyframes inR{from{transform:translateX(38%);opacity:.4}to{transform:none;opacity:1}}
  @keyframes inL{from{transform:translateX(-38%);opacity:.4}to{transform:none;opacity:1}}

  .top{display:flex;justify-content:space-between;align-items:center;flex:none;z-index:2;gap:6px;}
  .ttl{flex:1;text-align:center;font-weight:800;color:var(--accent);letter-spacing:-.4px;font-size:19px;
    display:inline-flex;flex-direction:column;align-items:center;line-height:1.05;}
  .ttl small{font-size:8.5px;font-weight:700;color:var(--muted);letter-spacing:1.5px;margin-top:1px;}
  .nav{font-size:19px;font-weight:800;color:var(--accent);cursor:pointer;line-height:1;flex:none;
    -webkit-app-region:no-drag;width:26px;height:26px;display:flex;align-items:center;justify-content:center;
    border-radius:50%;opacity:.55;transition:opacity .12s,background .12s;}
  .nav:hover{opacity:1;background:color-mix(in srgb, var(--accent) 16%, transparent);}
  .wkd{font-size:12px;font-weight:700;color:var(--muted);align-self:flex-end;margin:0 0 5px 3px;}
  [data-size="s"] .ttl{font-size:16px;} [data-size="s"] .nav{font-size:16px;width:22px;height:22px;}
  [data-size="l"] .ttl{font-size:22px;} [data-size="l"] .nav{font-size:22px;width:28px;height:28px;}

  /* collage of the month's seasonal foods, printed in one ink (duotone) */
  .stage{flex:1;position:relative;margin:4px 0;overflow:hidden;}
  .collage{position:absolute;inset:0;}
  .collage .pim{position:absolute;top:0;left:0;display:flex;flex-direction:column;align-items:center;
    -webkit-app-region:no-drag;cursor:grab;touch-action:none;will-change:transform;z-index:1;}
  .collage .pim:active{cursor:grabbing;}
  .collage .pim.sel{z-index:6;}
  .collage .pim-img{display:block;filter:drop-shadow(0 3px 5px #0000001f);transition:opacity .35s ease;}
  .collage .pim:hover .pim-img{filter:drop-shadow(0 6px 11px #0000003c);}
  .collage .lab{margin-top:-3px;font-size:9.5px;font-weight:700;color:#4a443c;background:#fbfaf6dd;
    padding:1px 6px;border-radius:7px;white-space:nowrap;box-shadow:0 1px 2px #00000016;
    max-width:140px;overflow:hidden;text-overflow:ellipsis;pointer-events:none;}
  .collage .pim.sel .lab{background:var(--accent);color:#fff;font-weight:800;}

  .daterow{display:flex;align-items:flex-end;gap:8px;flex:none;}
  .datebig{font-weight:900;color:var(--accent);letter-spacing:-2px;line-height:.85;}
  .dunit{font-weight:800;color:var(--accent);opacity:.85;margin-bottom:3px;}
  .caption{margin-left:auto;text-align:right;font-size:12px;font-weight:800;color:var(--ink);align-self:flex-end;margin-bottom:3px;}
  .caption small{display:block;font-size:9px;color:var(--muted);font-weight:600;}

  .foot{display:flex;justify-content:space-between;align-items:center;flex:none;margin-top:10px;padding-top:8px;border-top:1px solid #00000012;font-size:10px;font-weight:600;color:var(--muted);gap:8px;}
  .foot .cnt{flex:none;} .foot .cnt b{color:var(--ink);font-weight:800;}
  .foot #today{-webkit-app-region:no-drag;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .foot #today b{color:#5d564c;font-weight:700;}
  .foot .go-r{color:var(--accent);font-weight:800;cursor:pointer;}

  [data-size="s"] .datebig{font-size:34px;} [data-size="s"] .dunit{font-size:12px;} [data-size="s"] .foot{display:none;}
  [data-size="m"] .datebig{font-size:42px;} [data-size="m"] .dunit{font-size:15px;}
  [data-size="l"] .datebig{font-size:54px;} [data-size="l"] .dunit{font-size:18px;}
</style>
</head>
<body>
  <div class="shadowwrap">
   <div id="card" data-size="m">
    <div class="binding">
      <i class="ring"></i><i class="ring"></i><i class="ring"></i><i class="ring"></i><i class="ring"></i>
      <i class="ring"></i><i class="ring"></i><i class="ring"></i><i class="ring"></i><i class="ring"></i>
    </div>
    <div class="page" id="page">
      <div class="top">
        <span class="nav" id="prev">‹</span>
        <span class="ttl" id="mon">6월 제철 재료<small>JUNE · SEASONAL</small></span>
        <span class="nav" id="next">›</span>
      </div>
      <div class="stage"><div class="collage" id="collage"></div></div>
      <div class="daterow">
        <span class="datebig" id="datebig">18</span><span class="dunit" id="dunit">일</span>
        <span class="wkd" id="weekday">목</span>
        <span class="caption" id="caption">이달의 제철<small id="capsub"></small></span>
      </div>
      <div class="foot"><span id="today">제철 달력</span><span class="cnt" id="cnt"></span></div>
    </div>
   </div>
  </div>
  <script src="data.js"></script>
  <script src="slugs.js"></script>
  <script src="recipes.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
